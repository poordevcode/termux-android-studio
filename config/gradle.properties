# Termux Android Build Configuration
# Generated by setup_android_sdk.sh

# Native aarch64 aapt2 built from AOSP platform-tools-35.0.2 source (parses SDK 35/36/37
# resources.arsc, which the old 34.0.4 aapt2 cannot). Source/build under ~/android-sdk-tools-src.
android.aapt2FromMavenOverride=/data/data/com.termux/files/home/android-sdk/build-tools/36.0.0/aapt2

# Performance tuning for on-device builds
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.caching=true

# Force the Gradle daemon to use Termux's OpenJDK 21. This overrides the project's
# gradle/gradle-daemon-jvm.properties (which pins a JetBrains-vendor JDK that only
# Android Studio ships), so the repo file can stay in place for Studio while Termux
# builds use the local JDK instead of trying to auto-provision an unavailable JBR.
org.gradle.java.home=/data/data/com.termux/files/usr/lib/jvm/java-21-openjdk

# Kotlin
kotlin.daemon.jvmargs=-Xmx1536m

# Enable Compose compiler
android.useAndroidX=true

# Prefer IPv4 to avoid socket issues
systemProp.java.net.preferIPv4Stack=true
